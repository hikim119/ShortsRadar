name: daily-update

on:
  schedule:
    - cron: "0 21 * * *"   # 매일 21:00 UTC = 한국시간 아침 6시
  workflow_dispatch: {}     # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch + build report
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: python fetch_and_build.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add docs
          git commit -m "daily update $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
