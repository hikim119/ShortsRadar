name: daily-update

on:
  schedule:
    - cron: "0 */6 * * *"   # 6시간 간격 (UTC 0·6·12·18시 = KST 9·15·21·3시)
  workflow_dispatch: {}     # Actions 탭에서 수동 실행 버튼
  push:
    branches: [main]
    paths:
      - fetch_and_build.py  # 코드 수정 push 시 즉시 재수집·재배포
      - channels.json       # 관심 채널 편집 시에도 즉시 재수집

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch + build report
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: python fetch_and_build.py

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git pull --rebase origin main || true
          git add docs
          git commit -m "update $(date -u +%Y-%m-%dT%H:%M)" || echo "no changes"
          git push
